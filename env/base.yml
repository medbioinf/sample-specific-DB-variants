name: variant-toolbox
channels: [conda-forge, bioconda, defaults]
dependencies:
  # core
  - python=3.11
  - openjdk=17        # for GATK/Picard
  - pigz
  - parallel
  # alignment / prep
  - fastp=0.23.4
  - hisat2=2.2.1
  - gffread=0.12.7   
  # sam/bam/vcf toolchain
  - samtools=1.20
  - htslib=1.20       # bgzip/tabix
  - bcftools=1.20
  - bedtools=2.31.1
  # callers
  - freebayes=1.3.6
  - gatk4=4.5.0.0
  - picard=3.2.0
  # peptide translation
  - emboss=6.6.0